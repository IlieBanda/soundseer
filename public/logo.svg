<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <clipPath id="lens-clip">
    <circle cx="16" cy="16" r="12" />
  </clipPath>

  <!-- magnifying glass handle -->
  <line x1="25.5" y1="25.5" x2="35.5" y2="35.5" stroke="#34d399" stroke-width="3.5" stroke-linecap="round" />

  <!-- soundwave bars, clipped to the lens -->
  <g clip-path="url(#lens-clip)">
    <rect x="2" y="12" width="3" height="8" rx="1.5" fill="#6ee7b7" />
    <rect x="7" y="7" width="3" height="18" rx="1.5" fill="#34d399" />
    <rect x="12" y="2" width="3" height="28" rx="1.5" fill="#10b981" />
    <rect x="17" y="9" width="3" height="14" rx="1.5" fill="#34d399" />
    <rect x="22" y="13" width="3" height="6" rx="1.5" fill="#6ee7b7" />
    <rect x="27" y="15" width="3" height="2" rx="1" fill="#a7f3d0" />
  </g>

  <!-- lens outline -->
  <circle cx="16" cy="16" r="12" stroke="#34d399" stroke-width="2.5" />
</svg>
