<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="noteFill" x1="20%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#d9f99d" />
      <stop offset="45%" stop-color="#84cc16" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
    <filter id="shadowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" />
    </filter>
  </defs>

  <!-- drop shadow pass -->
  <g filter="url(#shadowBlur)" opacity="0.35" transform="translate(2,3)">
    <path
      d="M66,20 L66,58
         C66,74 54,86 38,84
         C24,82 16,70 18,58
         C20,46 32,38 44,40
         C50,41 52,45 50,50
         C48,53 45,54 43,52"
      stroke="#052e16"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <path
      d="M64,18 C77,17 92,24 97,39 C91,32 79,27 64,30 Z"
      fill="#052e16"
    />
  </g>

  <!-- main note ribbon (stem + loop + inner curl) -->
  <path
    d="M66,20 L66,58
       C66,74 54,86 38,84
       C24,82 16,70 18,58
       C20,46 32,38 44,40
       C50,41 52,45 50,50
       C48,53 45,54 43,52"
    stroke="url(#noteFill)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- flag -->
  <path
    d="M64,18 C77,17 92,24 97,39 C91,32 79,27 64,30 Z"
    fill="url(#noteFill)"
  />

  <!-- glossy highlight -->
  <path
    d="M60,24 L60,50 C56,44 46,42 38,46"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
    opacity="0.45"
    filter="url(#softBlur)"
  />
</svg>
